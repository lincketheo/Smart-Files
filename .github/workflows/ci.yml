name: CI
on:
  push:
  pull_request:
jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TEST_BIN: ./build/${{ matrix.preset }}/apps/test
      SAMPLES_DIR: ./build/${{ matrix.preset }}/samples
      SAMPLES: sample1_basic_crud sample2_transactions sample3_stride sample4_variable_names sample5_rollback_commit
      LEAKS: leaks --atExit --
      VALGRIND: valgrind --tool=memcheck --leak-check=full --leak-resolution=high --show-leak-kinds=all --track-origins=yes --track-fds=yes --error-exitcode=1 --errors-for-leak-kinds=all --undef-value-errors=yes --partial-loads-ok=no --expensive-definedness-checks=yes --show-mismatched-frees=yes --show-reachable=yes --num-callers=40 --

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - { os: ubuntu-latest,  preset: debug,                 run_tests: true,  extra: false } 
          - { os: ubuntu-latest,  preset: debug-no-asan,         run_tests: true,  extra: true  }
          - { os: ubuntu-latest,  preset: debug-ntests,          run_tests: false, extra: false }
          - { os: ubuntu-latest,  preset: debug-ntests-no-asan,  run_tests: false, extra: false }
          - { os: ubuntu-latest,  preset: release,               run_tests: false, extra: false }
          - { os: ubuntu-latest,  preset: release-tests,         run_tests: true,  extra: true  }
          - { os: ubuntu-latest,  preset: package-release,       run_tests: false, extra: false }

          # macOS
          - { os: macos-latest,   preset: debug,                 run_tests: true,  extra: false }
          - { os: macos-latest,   preset: debug-no-asan,         run_tests: true,  extra: true  }
          - { os: macos-latest,   preset: debug-ntests,          run_tests: false, extra: false }
          - { os: macos-latest,   preset: debug-ntests-no-asan,  run_tests: false, extra: false }
          - { os: macos-latest,   preset: release,               run_tests: false, extra: false }
          - { os: macos-latest,   preset: release-tests,         run_tests: true,  extra: true  }
          - { os: macos-latest,   preset: package-release,       run_tests: false, extra: false }

          # Windows 
          - { os: windows-latest, preset: debug,                 run_tests: true,  extra: false }
          - { os: windows-latest, preset: debug-no-asan,         run_tests: true,  extra: false }
          - { os: windows-latest, preset: debug-ntests,          run_tests: false, extra: false }
          - { os: windows-latest, preset: debug-ntests-no-asan,  run_tests: false, extra: false }
          - { os: windows-latest, preset: release,               run_tests: false, extra: false }
          - { os: windows-latest, preset: release-tests,         run_tests: true,  extra: false }
          - { os: windows-latest, preset: package-release,       run_tests: false, extra: false }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Valgrind
        if: matrix.extra && matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y valgrind

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra && '-DENABLE_PORTABLE=ON' || '' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # ── Test ───────────────────────────────────────────────────────────────
      - name: Test
        if: matrix.run_tests && !matrix.extra && matrix.os != 'windows-latest'
        run: ${{ env.TEST_BIN }}

      - name: Test
        if: matrix.run_tests && !matrix.extra && matrix.os == 'windows-latest'
        run: ./build/${{ matrix.preset }}/apps/Debug/test.exe

      - name: Test (leaks)
        if: matrix.extra && matrix.os == 'macos-latest'
        run: ${{ env.LEAKS }} ${{ env.TEST_BIN }}

      - name: Test (valgrind)
        if: matrix.extra && matrix.os == 'ubuntu-latest'
        run: ${{ env.VALGRIND }} ${{ env.TEST_BIN }}

      # ── Samples ────────────────────────────────────────────────────────────
      - name: Samples
        if: '!matrix.extra && matrix.os != ''windows-latest'''
        shell: bash
        run: |
          for sample in $SAMPLES; do
            for run in 1 2; do
              echo "[$run/2] $sample"
              $SAMPLES_DIR/$sample
            done
          done

      - name: Samples
        if: '!matrix.extra && matrix.os == ''windows-latest'''
        shell: bash
        run: |
          for sample in $SAMPLES; do
            for run in 1 2; do
              echo "[$run/2] $sample"
              ./build/${{ matrix.preset }}/samples/Debug/$sample.exe
            done
          done

      - name: Samples (leaks)
        if: matrix.extra && matrix.os == 'macos-latest'
        shell: bash
        run: |
          for sample in $SAMPLES; do
            for run in 1 2; do
              echo "[$run/2] $sample"
              $LEAKS $SAMPLES_DIR/$sample
            done
          done

      - name: Samples (valgrind)
        if: matrix.extra && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          for sample in $SAMPLES; do
            for run in 1 2; do
              echo "[$run/2] $sample"
              $VALGRIND $SAMPLES_DIR/$sample
            done
          done
